name: Release

# Publishes to crates.io via Trusted Publishing (OIDC — no long-lived token
# secret). Runs when a v* tag is pushed, as a reusable workflow from bump.yml
# (tags pushed by a workflow's GITHUB_TOKEN don't trigger tag workflows, so
# the bump path calls this directly), or manually via workflow_dispatch to
# (re-)release an existing tag whose publish never landed.
#
# crates.io setup: writeahead -> Settings -> Trusted Publishing -> GitHub:
# danthegoodman1/WriteAhead with workflow release.yml, and a second entry
# for bump.yml (the OIDC claim names the top-level workflow).

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      ref:
        description: Git ref to release (the tag created by the bump workflow)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Existing v* tag to release (publish is skipped if that version is already on crates.io)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'push'
        run: |
          crate_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version" >&2
            exit 1
          fi
      - name: Check if version is already on crates.io
        id: check
        run: |
          crate_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          status=$(curl -s -o /dev/null -w "%{http_code}" -A "writeahead-release-workflow" "https://crates.io/api/v1/crates/writeahead/${crate_version}")
          if [ "$status" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "writeahead ${crate_version} is already on crates.io; skipping publish"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
