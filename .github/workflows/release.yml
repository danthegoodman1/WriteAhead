name: Release

# Publishes to crates.io when a v* tag is pushed, via crates.io Trusted
# Publishing (OIDC — no long-lived token secret). One-time setup after the
# first manual publish: crates.io -> writeahead -> Settings -> Trusted
# Publishing -> GitHub: danthegoodman1/WriteAhead, workflow release.yml.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches Cargo.toml version
        run: |
          crate_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version" >&2
            exit 1
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
